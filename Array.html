<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Program</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
            padding-top: 50px;
        }

        .box {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 10px 10px gray;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(0, 0, 252);
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Array Example</h2>

        <button onclick="showFruits()">
            Show Fruits
        </button>

        <div id="result"></div>
    </div>

    <script>
        let fruits = ["Apple", "Mango", "Orange", "Banana"];

        function showFruits() {
            document.getElementById("result").innerHTML =
                fruits.join("<br>");
        }
    </script>


</body>
